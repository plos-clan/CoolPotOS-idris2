[alias]
# The builder tool must run on the host, not the default RISC-V target.
# If you move this repo to a different host triple, update the target below.
kbuild = "run --target x86_64-unknown-linux-gnu --manifest-path builder/Cargo.toml -- build"
krun = "run --target x86_64-unknown-linux-gnu --manifest-path builder/Cargo.toml -- run"
kclippy = "run --target x86_64-unknown-linux-gnu --manifest-path builder/Cargo.toml -- clippy"

[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
  "-C",
  "link-arg=-Tkernel/linker_riscv64.ld",
  "-C",
  "link-arg=--gc-sections",
]
